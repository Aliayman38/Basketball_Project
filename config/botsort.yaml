# config/botsort.yaml
# BoT-SORT tracker — uses appearance ReID features to re-identify players
# after they leave and re-enter the frame. Much more stable than ByteTrack
# for basketball where players frequently exit the camera view.

tracker_type: botsort
model: auto

# Detection confidence thresholds
track_high_thresh: 0.25       # High-conf detections initialise new tracks
track_low_thresh: 0.10        # Low-conf used in second association pass
new_track_thresh: 0.25        # Minimum conf to start a brand new track

# How long a track survives without a matching detection.
# 90 frames = 3 s at 30 fps — covers full out-of-frame excursions.
track_buffer: 90

# IoU threshold for first-pass Hungarian assignment
match_thresh: 0.65

# ── BoT-SORT specific ─────────────────────────────────────────────────────────

# Weight of appearance (ReID) vs motion (IoU) in the distance matrix.
# 0.5 = equal weight. Higher = trust appearance more over motion.
# For basketball (fast motion, similar jerseys): 0.4 is a safe balance.
proximity_thresh: 0.5
appearance_thresh: 0.4

# Use GMC (Generalized Motion Compensation) to correct for camera movement.
# Basketball broadcasts often pan/zoom — this stabilises the Kalman filter.
with_reid: false