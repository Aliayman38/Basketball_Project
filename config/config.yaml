# Master Configuration for Basketball Tracking Pipeline

# 1. File Paths
paths:
  input_video: "data/basketball_match.mp4"   # The video you want to analyze
  output_video: "runs/output_match.mp4"      # Where the final tracked video is saved
  yolo_weights: "runs/detect/train/weights/best.pt" # The model you will train in Phase 3

# 2. YOLOv11 Detection Settings
detection:
  conf_threshold: 0.5   # Minimum confidence to detect an object
  iou_threshold: 0.45   # Intersection over Union for Non-Maximum Suppression
  classes: [0, 1, 2]    # 0: ball, 1: player, 2: referee

# 3. Tracking Settings
tracking:
  tracker_type: "bytetrack.yaml" # Built-in robust tracker

# 4. Team Clustering Settings
clustering:
  n_clusters: 2 # Team A and Team B

# 5. Analytics & Homography Settings (FIBA Standard Dimensions)
analytics:
  court_length_meters: 28.0
  court_width_meters: 15.0